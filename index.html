<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edinburgh Shoot Planner — Studio Slowecho</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,0&display=swap">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/filters.css">
  <link rel="stylesheet" href="css/cards.css">
  <link rel="stylesheet" href="css/modal.css">
  <link rel="stylesheet" href="css/shortlist.css">
  <link rel="stylesheet" href="css/map.css">
</head>
<body>

  <!-- ================================================================
       MAP — fills the entire viewport as background
       ================================================================ -->
  <section class="map-panel" id="map-panel" aria-label="Map of locations">
    <div id="map"></div>
  </section>


  <!-- ================================================================
       LOCATION PANEL
       Desktop: floating left sidebar
       Mobile:  bottom sheet with drag handle
       ================================================================ -->
  <aside class="location-panel" id="location-panel" aria-label="Browse locations">

    <!-- Mobile-only drag handle -->
    <div class="panel-grip" id="panel-grip" aria-label="Expand location list">
      <div class="panel-grip-bar"></div>
    </div>

    <!-- Shortlist toggle + filter bar -->
    <div class="panel-top">
      <div class="panel-header">
        <button class="shortlist-toggle" id="shortlist-toggle" aria-label="View shortlist">Shortlist (<span id="shortlist-count">0</span>)</button>
      </div>
      <p class="filter-bar" id="filter-bar" role="navigation" aria-label="Filter by location type"><button class="filter-item active" data-filter="all">All,</button><button class="filter-item" data-filter="viewpoint">Viewpoints,</button><button class="filter-item" data-filter="historic-street">Historic Streets,</button><button class="filter-item" data-filter="architecture">Architecture,</button><button class="filter-item" data-filter="greenspace">Green Spaces,</button><button class="filter-item" data-filter="waterside">Waterside,</button><button class="filter-item" data-filter="hidden-gem">Hidden Gems</button></p>
    </div>

    <!-- Scrollable card list -->
    <div class="cards-panel" id="cards-panel">
      <div class="cards-grid" id="cards-grid"></div>
      <p class="no-results" id="no-results" hidden>No locations match this filter.</p>
    </div>

  </aside><!-- /location-panel -->


  <!-- ================================================================
       SHORTLIST DRAWER
       ================================================================ -->
  <aside class="shortlist-drawer" id="shortlist-drawer" aria-label="Your shortlist">
    <div class="drawer-header">
      <p class="drawer-title">Your Shortlist (<span id="shortlist-count-drawer">0</span>)</p>
      <button class="drawer-close" id="drawer-close">Close</button>
    </div>

    <div class="drawer-body">
      <p class="drawer-empty" id="drawer-empty">No locations saved yet.</p>
      <ul class="shortlist-list" id="shortlist-list" aria-label="Saved locations"></ul>
    </div>

    <div class="drawer-footer">
      <div class="duration-row">
        <span class="duration-label">Estimated Duration (Commute Time Excl.)</span>
        <strong class="duration-value" id="duration-total">—</strong>
      </div>
      <button class="export-btn" id="export-btn">Export as JPEG</button>
    </div>
  </aside>


  <!-- ================================================================
       CARD EXPAND MODAL
       ================================================================ -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true"
       aria-label="Location details">
    <div class="modal-inner" id="modal-inner"></div>
  </div>


  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script type="module" src="js/main.js"></script>

</body>
</html>
