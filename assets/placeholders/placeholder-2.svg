<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2a1f1a"/>
      <stop offset="55%"  stop-color="#5c3420"/>
      <stop offset="100%" stop-color="#1a1210"/>
    </linearGradient>
    <linearGradient id="water2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3a2510"/>
      <stop offset="100%" stop-color="#110d08"/>
    </linearGradient>
  </defs>

  <!-- Sky — warm dusk -->
  <rect width="800" height="600" fill="url(#sky2)"/>

  <!-- Horizon band -->
  <rect x="0" y="280" width="800" height="40" fill="#c8a96e" opacity="0.18"/>

  <!-- Cobblestone street — perspective -->
  <path d="M200 600 L600 600 L520 320 L280 320Z" fill="#1e1710" opacity="0.85"/>

  <!-- Street joints (cobbles) -->
  <line x1="250" y1="360" x2="550" y2="360" stroke="#2a2018" stroke-width="1" opacity="0.6"/>
  <line x1="230" y1="400" x2="570" y2="400" stroke="#2a2018" stroke-width="1" opacity="0.6"/>
  <line x1="215" y1="440" x2="585" y2="440" stroke="#2a2018" stroke-width="1" opacity="0.6"/>
  <line x1="205" y1="480" x2="595" y2="480" stroke="#2a2018" stroke-width="1" opacity="0.6"/>
  <line x1="200" y1="520" x2="600" y2="520" stroke="#2a2018" stroke-width="1" opacity="0.6"/>

  <!-- Left building façade -->
  <rect x="0"   y="180" width="220" height="420" fill="#1a140e"/>
  <rect x="0"   y="180" width="218" height="420" fill="none" stroke="#2e2418" stroke-width="1"/>
  <!-- Windows left -->
  <rect x="30"  y="220" width="40" height="55" rx="2" fill="#3d2e1a" opacity="0.8"/>
  <rect x="90"  y="220" width="40" height="55" rx="2" fill="#c8a96e" opacity="0.25"/>
  <rect x="150" y="220" width="40" height="55" rx="2" fill="#3d2e1a" opacity="0.8"/>
  <rect x="30"  y="310" width="40" height="55" rx="2" fill="#3d2e1a" opacity="0.8"/>
  <rect x="90"  y="310" width="40" height="55" rx="2" fill="#c8a96e" opacity="0.3"/>
  <rect x="150" y="310" width="40" height="55" rx="2" fill="#3d2e1a" opacity="0.8"/>
  <rect x="30"  y="400" width="40" height="55" rx="2" fill="#3d2e1a" opacity="0.8"/>
  <rect x="90"  y="400" width="40" height="55" rx="2" fill="#3d2e1a" opacity="0.8"/>
  <rect x="150" y="400" width="40" height="55" rx="2" fill="#c8a96e" opacity="0.2"/>

  <!-- Right building façade -->
  <rect x="580" y="200" width="220" height="400" fill="#1a140e"/>
  <!-- Windows right -->
  <rect x="600" y="240" width="40" height="55" rx="2" fill="#c8a96e" opacity="0.28"/>
  <rect x="660" y="240" width="40" height="55" rx="2" fill="#3d2e1a" opacity="0.8"/>
  <rect x="720" y="240" width="40" height="55" rx="2" fill="#3d2e1a" opacity="0.8"/>
  <rect x="600" y="330" width="40" height="55" rx="2" fill="#3d2e1a" opacity="0.8"/>
  <rect x="660" y="330" width="40" height="55" rx="2" fill="#c8a96e" opacity="0.22"/>
  <rect x="720" y="330" width="40" height="55" rx="2" fill="#3d2e1a" opacity="0.8"/>

  <!-- Street lamp left -->
  <line x1="195" y1="340" x2="195" y2="580" stroke="#2e2418" stroke-width="4"/>
  <circle cx="195" cy="338" r="10" fill="#c8a96e" opacity="0.6"/>
  <ellipse cx="195" cy="346" rx="18" ry="8" fill="#c8a96e" opacity="0.15"/>

  <!-- Street lamp right -->
  <line x1="605" y1="340" x2="605" y2="580" stroke="#2e2418" stroke-width="4"/>
  <circle cx="605" cy="338" r="10" fill="#c8a96e" opacity="0.6"/>
  <ellipse cx="605" cy="346" rx="18" ry="8" fill="#c8a96e" opacity="0.15"/>

  <!-- Distant arch -->
  <path d="M340 320 L340 290 Q400 260 460 290 L460 320Z" fill="#12100c"/>

  <rect x="0" y="560" width="800" height="40" fill="rgba(0,0,0,0.4)"/>
  <text x="16" y="585" font-family="Georgia, serif" font-size="13" fill="#888" letter-spacing="0.06em">PHOTO PLACEHOLDER</text>
</svg>
