<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="sky3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0e1820"/>
      <stop offset="60%"  stop-color="#1c3040"/>
      <stop offset="100%" stop-color="#0a1218"/>
    </linearGradient>
    <linearGradient id="water3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1a2c3a"/>
      <stop offset="100%" stop-color="#060e14"/>
    </linearGradient>
    <linearGradient id="causeway" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1e2830"/>
      <stop offset="100%" stop-color="#131c22"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="600" fill="url(#sky3)"/>

  <!-- Subtle cloud streaks -->
  <ellipse cx="200" cy="120" rx="160" ry="22" fill="#1e2e3c" opacity="0.5"/>
  <ellipse cx="560" cy="90"  rx="190" ry="18" fill="#1e2e3c" opacity="0.45"/>
  <ellipse cx="380" cy="160" rx="120" ry="14" fill="#1e2e3c" opacity="0.35"/>

  <!-- Horizon glow — cold blue -->
  <ellipse cx="400" cy="310" rx="420" ry="60" fill="#3a6080" opacity="0.22"/>

  <!-- Water — lower half -->
  <rect x="0" y="320" width="800" height="280" fill="url(#water3)"/>

  <!-- Water ripple lines -->
  <line x1="0"   y1="355" x2="800" y2="355" stroke="#1e3a50" stroke-width="1" opacity="0.5"/>
  <line x1="0"   y1="390" x2="800" y2="390" stroke="#1e3a50" stroke-width="1" opacity="0.4"/>
  <line x1="0"   y1="430" x2="800" y2="430" stroke="#1e3a50" stroke-width="1" opacity="0.35"/>
  <line x1="0"   y1="475" x2="800" y2="475" stroke="#1e3a50" stroke-width="1" opacity="0.3"/>
  <line x1="0"   y1="525" x2="800" y2="525" stroke="#1e3a50" stroke-width="1" opacity="0.25"/>

  <!-- Light reflection on water -->
  <ellipse cx="400" cy="380" rx="120" ry="18" fill="#c8a96e" opacity="0.07"/>
  <ellipse cx="400" cy="420" rx="80"  ry="10" fill="#c8a96e" opacity="0.05"/>

  <!-- Island silhouette -->
  <path d="M240 310 Q320 280 400 285 Q480 278 560 308 L560 324 Q480 314 400 318 Q320 322 240 326Z"
        fill="#0a1218"/>

  <!-- Tidal causeway -->
  <path d="M160 600 L220 326 L580 326 L640 600Z" fill="url(#causeway)" opacity="0.9"/>
  <!-- Causeway edge lines -->
  <line x1="220" y1="326" x2="160" y2="600" stroke="#253040" stroke-width="1.5" opacity="0.6"/>
  <line x1="580" y1="326" x2="640" y2="600" stroke="#253040" stroke-width="1.5" opacity="0.6"/>

  <!-- WWII ruin silhouettes on island -->
  <rect x="310" y="265" width="18" height="40" rx="1" fill="#080e14"/>
  <rect x="335" y="270" width="24" height="36" rx="1" fill="#080e14"/>
  <rect x="366" y="260" width="14" height="48" rx="1" fill="#080e14"/>
  <rect x="386" y="268" width="20" height="38" rx="1" fill="#080e14"/>
  <rect x="413" y="272" width="16" height="34" rx="1" fill="#080e14"/>
  <!-- Broken wall -->
  <path d="M295 295 L295 290 L310 290 L310 285 L320 285 L320 295Z" fill="#080e14"/>

  <!-- Stars scattered -->
  <circle cx="80"  cy="50"  r="1"   fill="#fff" opacity="0.6"/>
  <circle cx="170" cy="80"  r="1.3" fill="#fff" opacity="0.7"/>
  <circle cx="310" cy="40"  r="0.9" fill="#fff" opacity="0.55"/>
  <circle cx="480" cy="70"  r="1.2" fill="#fff" opacity="0.65"/>
  <circle cx="600" cy="45"  r="1"   fill="#fff" opacity="0.7"/>
  <circle cx="720" cy="80"  r="1.1" fill="#fff" opacity="0.6"/>
  <circle cx="750" cy="140" r="0.8" fill="#fff" opacity="0.5"/>
  <circle cx="50"  cy="180" r="0.9" fill="#fff" opacity="0.45"/>

  <!-- Lighthouse / beacon -->
  <rect x="396" y="220" width="8" height="40" rx="1" fill="#0d1620"/>
  <circle cx="400" cy="218" r="5" fill="#c8a96e" opacity="0.9"/>
  <ellipse cx="400" cy="224" rx="12" ry="5" fill="#c8a96e" opacity="0.2"/>

  <rect x="0" y="560" width="800" height="40" fill="rgba(0,0,0,0.4)"/>
  <text x="16" y="585" font-family="Georgia, serif" font-size="13" fill="#888" letter-spacing="0.06em">PHOTO PLACEHOLDER</text>
</svg>
